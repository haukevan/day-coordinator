<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Timeline track -->
  <line x1="12" y1="24" x2="56" y2="24" stroke="#4f7cff" stroke-width="2"/>
  <line x1="56" y1="24" x2="100" y2="24" stroke="#4f7cff" stroke-width="2"/>
  <line x1="100" y1="24" x2="144" y2="24" stroke="#4f7cff" stroke-width="2" stroke-dasharray="4 2"/>

  <!-- Nodes -->
  <circle cx="12" cy="24" r="5" fill="#22c55e"/>
  <circle cx="56" cy="24" r="5" fill="#4f7cff"/>
  <circle cx="100" cy="24" r="5" fill="#4f7cff"/>
  <circle cx="144" cy="24" r="4" fill="none" stroke="#4f7cff" stroke-width="2"/>

  <!-- Pulse ring on active node -->
  <circle cx="56" cy="24" r="10" fill="none" stroke="#4f7cff" stroke-width="1" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="158" y="19" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#e5e7eb">day</text>
  <text x="158" y="33" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#9ca3af">coordinator</text>
